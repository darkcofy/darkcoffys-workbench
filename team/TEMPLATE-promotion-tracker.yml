# ──────────────────────────────────────────────
# Promotion Tracker — Data Architect Manager → Senior Manager / Director
# ──────────────────────────────────────────────
# Big 4 promotions are driven by 5 pillars. Track your evidence
# against each one. Update weekly. This is YOUR review document
# when the time comes — the person with the best evidence wins.
#
# Keep this file PRIVATE (in .gitignore or a private repo).
# ──────────────────────────────────────────────

target_role: "Senior Manager"  # or Director
target_date: "2027-09-01"      # 18 months from start
start_date: "2026-04-01"       # adjust to your actual start
current_role: "Manager — Data Architecture"
service_line: ""               # e.g., "Technology Consulting" / "Data & Analytics"
counselor: ""                  # your career counselor / mentor
sponsor: ""                    # the partner who champions your promotion

# ═══════════════════════════════════════════════
# PILLAR 1: Client Delivery & Revenue
# ═══════════════════════════════════════════════
# What they measure: utilization %, revenue managed, client satisfaction,
# delivery quality, ability to run engagements independently.
#
# Target: 75-85% utilization, manage $1M+ in engagements

delivery:
  utilization_target: 80  # percent
  revenue_managed: 0      # total $ value of engagements you're running

  engagements:
    # - name: "Client X — Data Platform Build"
    #   client: "Client X"
    #   role: "Engagement lead"  # lead | architect | contributor
    #   budget_hours: 800
    #   budget_value: 320000
    #   start: "2026-04-15"
    #   end: "2026-09-30"
    #   status: active  # active | completed | at-risk
    #   satisfaction: null  # 1-5, from client feedback
    #   key_wins:
    #     - "Delivered 2 weeks early"
    #     - "Client extended SOW by $150K"

  evidence:
    # - date: "2026-06-15"
    #   what: "Led architecture review for Client X migration"
    #   impact: "Identified $200K savings by consolidating 3 pipelines"

  feedback_received:
    # - date: "2026-06-15"
    #   from: "Partner Jane Smith"
    #   context: "Quarterly review"
    #   quote: "Alfred's architecture work on Client X was the best I've seen this year"
    #   type: peer | upward | client | review   # source context, not judgment

