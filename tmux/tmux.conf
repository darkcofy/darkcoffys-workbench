# ──────────────────────────────────────────────
# darkcoffys-workbench :: tmux config
# ──────────────────────────────────────────────

# ── Prefix: Ctrl-Space ──
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── General ──
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on

# ── Splits (intuitive keys) ──
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Pane navigation (vim-style) ──
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Pane resizing ──
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# ── New window in current path ──
bind c new-window -c "#{pane_current_path}"

# ── Reload config ──
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Status bar (minimal, low-clutter) ──
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left " #[fg=#89b4fa,bold]#S #[fg=#585b70]│ "
set -g status-left-length 30
set -g status-right "#[fg=#585b70]│ #[fg=#a6adc8]%H:%M "
set -g status-right-length 20
setw -g window-status-format " #[fg=#6c7086]#I:#W "
setw -g window-status-current-format " #[fg=#89b4fa,bold]#I:#W "

# ── Copy mode (vi keys) ──
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
