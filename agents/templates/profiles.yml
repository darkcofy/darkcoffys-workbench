# ──────────────────────────────────────────────
# dbt profiles template
# ──────────────────────────────────────────────
# Place in project root with DBT_PROFILES_DIR=. in .env
# Or copy to ~/.dbt/profiles.yml

my_project:  # ← replace with your dbt project name
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DB_HOST', 'localhost') }}"
      port: "{{ env_var('DB_PORT', '5432') | int }}"
      user: "{{ env_var('DB_USER') }}"
      password: "{{ env_var('DB_PASSWORD') }}"
      dbname: "{{ env_var('DB_NAME') }}"
      schema: dev
      threads: 4

