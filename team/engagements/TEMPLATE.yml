# ──────────────────────────────────────────────
# Engagement Tracker
# ──────────────────────────────────────────────
# Copy this file for each active engagement:
#   cp TEMPLATE.yml client-x-data-platform.yml
#
# Update weekly. This feeds into your status report
# and is your evidence for the delivery pillar.
# ──────────────────────────────────────────────

engagement:
  name: ""                    # e.g., "Data Platform Modernization"
  client: ""
  code: ""                    # internal engagement code
  status: active              # active | completed | on-hold | at-risk

# ── Dates & budget ──
timeline:
  start: ""                   # YYYY-MM-DD
  end: ""                     # planned end
  actual_end: null

budget:
  type: "fixed-fee"           # fixed-fee | time-and-materials | retainer
  total_hours: 0
  total_value: 0              # $
  hours_burned: 0
  hours_remaining: 0
  burn_rate_weekly: 0         # avg hours/week
  weeks_remaining: 0          # auto-calculate: hours_remaining / burn_rate_weekly
  runway_status: "green"      # green (>4 weeks) | amber (2-4 weeks) | red (<2 weeks)

# ── Team ──
team:
  # - name: "Sarah Chen"
  #   role: "Lead analyst"
  #   allocation: 80          # percent
  #   hours_burned: 120
  #   start: "2026-04-15"
  #   end: "2026-09-30"

# ── Deliverables ──
deliverables:
